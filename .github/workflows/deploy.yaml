name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

# Only allow one deploy to be in flight at a time.
concurrency:
  group: auto-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          filter: "blob:none"

      - name: Notify Discord (in progress)
        shell: bash
        run: |
          PAYLOAD=$(jq -n \
            --arg sha "${{ github.sha }}" \
            --arg run_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{embeds: [{title: "autodeploy in progress...", color: 16776960, fields: [
              {name: "commit", value: $sha, inline: true},
              {name: "run", value: "[view logs](\($run_url))", inline: true}
            ]}]}')

          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:ci

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true
            substituters = https://cache.t4t.net/ https://cache.nixos.org/
            trusted-public-keys = cache.t4t.net-1:7NimrD/skv9tL7c3UjgwMxpup/RNcvzd7yrH0QNnlF0= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          # restore and save a cache using this key
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          # if there's no cache hit, restore a cache by this prefix
          restore-prefixes-first-match: nix-${{ runner.os }}-
          # collect garbage until the Nix store size (in bytes) is at most this number
          # before trying to save a new cache
          # 1G = 1073741824
          gc-max-store-size-linux: 1G
          # do purge caches
          purge: true
          # purge all versions of the cache
          purge-prefixes: nix-${{ runner.os }}-
          # created more than this number of seconds ago
          purge-created: 0
          # or last accessed this duration (ISO 8601 duration format)
          # before the start of the `Post Restore and save Nix store` phase
          purge-last-accessed: P1DT12H
          # except any version with the key that is the same as the `primary-key`
          purge-primary-key: never

      # Get into our Nix shell :D
      - uses: nicknovitski/nix-develop@v1
        with:
          arguments: "./nix"

      - name: Start SSH agent
        shell: bash
        run: |
          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      - name: Get deploy SSH certificate via OIDC
        shell: bash
        env:
          CA_URL: https://ca.t4t.net
          CA_FINGERPRINT: 43c891ed6cbf41cec282e972df5e567ab1593a5cb69ac6a8f25304895fd71b31
        run: |
          # Fetch a GitHub OIDC token scoped to our step-ca
          TOKEN=$(curl -sSf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://ca.t4t.net" \
            | jq -r .value)

          curl -sLO https://token.actions.githubusercontent.com/.well-known/jwks
          echo $TOKEN | step crypto jwt verify \
            --jwks jwks \
            --aud https://ca.t4t.net \
            --iss "https://token.actions.githubusercontent.com"

          SUBSCRIBER=$(echo $TOKEN | step crypto jwt inspect --insecure | jq -r .payload.sub)

          # Generate ephemeral deploy key
          ssh-keygen -t ed25519 -f /tmp/ci_deploy_key -N "" -q

          # step-cli's --token flag for OIDC JWTs has a bug where it tries to look up
          # the JWT kid in step-ca's root store, which fails because GitHub's OIDC
          # signing key isn't there. call the step-ca REST API directly instead.
          PUBKEY_BLOB=$(awk '{print $2}' /tmp/ci_deploy_key.pub)
          CERT=$(curl -sSf \
            --cacert "$GITHUB_WORKSPACE/certificates/root-ca.crt" \
            -X POST "${CA_URL}/1.0/ssh/sign" \
            -H "Content-Type: application/json" \
            -d "{\"publicKey\":\"$PUBKEY_BLOB\",\"ott\":\"$TOKEN\",\"certType\":\"user\"}" \
            | jq -r .crt)

          mkdir -p ~/.ssh
          echo "@cert-authority * ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBGMZdIhB/gSYre5T3IOx82+PLl9yhOEV4/fZI0pOE23UEmSB0XCr90t3BQp/LkDWw7pPweaR1dAPqjV+sQ+Lxxs=" > ~/.ssh/known_hosts
          CERT_TYPE="$(awk '{print $1}' /tmp/ci_deploy_key.pub)-cert-v01@openssh.com"
          printf '%s %s %s\n' "$CERT_TYPE" "$CERT" "$SUBSCRIBER" | tee /tmp/ci_deploy_key-cert.pub
          ssh-keygen -L -f /tmp/ci_deploy_key-cert.pub
          ssh-add /tmp/ci_deploy_key
          ssh-add -l

      - name: Write CI builders
        shell: bash
        run: |
          sudo mkdir -p /etc/nix
          nix eval --raw ./nix#ciBuilders | sudo tee /etc/nix/machines

      - name: Deploy with Colmena
        id: deploy
        shell: bash
        run: |
          colmena apply --on @auto-deploy -f ./nix/flake.nix

      - name: Notify Discord
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.deploy.outcome }}" = "success" ]; then
            COLOR=3066993
            STATUS="autodeploy succeeded :3"
          else
            COLOR=15158332
            STATUS="autodeploy failed >//< (${{ steps.deploy.outcome }})"
          fi

          PAYLOAD=$(jq -n \
            --argjson color "$COLOR" \
            --arg status "$STATUS" \
            --arg sha "${{ github.sha }}" \
            --arg run_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{embeds: [{title: $status, color: $color, fields: [
              {name: "commit", value: $sha, inline: true},
              {name: "run", value: "[view logs](\($run_url))", inline: true}
            ]}]}')

          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
